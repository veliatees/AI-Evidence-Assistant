$kind: http-request
name: Create Document
method: POST
url: 'http://localhost:8000/documents'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "title": "Sample Document",
      "text": "This is a sample document text that is long enough to meet the minimum length requirement."
    }
