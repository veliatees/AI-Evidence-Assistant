$kind: http-request
name: Create Document
method: POST
url: http://localhost:8000/documents
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
        "title": "Sample Document",
        "text": "This is a short test document about artificial intelligence, retrieval systems, and evidence-based answers."
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response has an 'id' field that is a string", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property("id");
          pm.expect(jsonData.id).to.be.a("string");
      });

      pm.test("Response has a 'title' field equal to 'Sample Document'", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property("title");
          pm.expect(jsonData.title).to.eql("Sample Document");
      });

      pm.test("Response has 'char_count' that is a number greater than 0", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property("char_count");
          pm.expect(jsonData.char_count).to.be.a("number").and.to.be.above(0);
      });

      pm.test("Response has 'word_count' that is a number greater than 0", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property("word_count");
          pm.expect(jsonData.word_count).to.be.a("number").and.to.be.above(0);
      });
    language: text/javascript
